name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build debug APK
        working-directory: android
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Run Android Lint
        working-directory: android
        run: ./gradlew :app:lintDebug --no-daemon --stacktrace
        continue-on-error: true  # remove once we fix all baseline warnings

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: app-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

  shell:
    name: Shell scripts (shellcheck + bash -n)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: bash -n syntax check
        run: |
          set -e
          for f in scripts/*.sh; do
            echo "::group::bash -n $f"
            bash -n "$f"
            echo "::endgroup::"
          done
      - name: shellcheck
        run: |
          shellcheck --severity=warning scripts/install.sh \
            scripts/fetch_artifacts.sh scripts/preflight.sh \
            scripts/setup_litertlm_android.sh \
            scripts/run_cpu_smoke.sh scripts/run_gpu_smoke.sh \
            scripts/run_litertlm_benchmark.sh \
            scripts/parse_litertlm_logs.sh \
            scripts/cleanup_device_tmp.sh
        continue-on-error: true  # baseline; tighten over time
