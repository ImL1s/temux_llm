name: Bug report
description: Something is broken or behaves unexpectedly.
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A short factual description.
      placeholder: e.g. POST /api/generate returned exit_code=-1 with no body.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: The exact commands you ran and what you saw.
      render: bash
      placeholder: |
        $ bash scripts/install.sh
        $ adb shell curl -X POST 127.0.0.1:11434/api/generate -d '{"prompt":"hi"}'
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device + SoC + Android version
      placeholder: Galaxy Z Fold7, SM8750 Snapdragon 8 Elite for Galaxy, Android 16
    validations:
      required: true

  - type: dropdown
    id: backend
    attributes:
      label: Backend
      options:
        - gpu
        - cpu
        - both
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Model
      placeholder: gemma-4-E2B-it.litertlm
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        `adb logcat -d -t 200 | grep -E 'temuxllm|LiteRtLm|native' | tail -50`
      render: shell
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: temux_llm version (or commit)
    validations:
      required: true
